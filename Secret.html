    <script>
        (function () {
            // Safely get the top-level URL, handling cross-origin iframes
            var topUrl = '';
            try {
                topUrl = (window.top !== window.self) ? window.top.location.href : window.location.href;
            } catch (e) {
                // Fallback if CORS prevents reading window.top (like standard Shopify embeds)
                topUrl = document.referrer || window.location.href;
            }

            function extractActiveToken() {
                var pathMatch = topUrl.match(/ref:([A-Z0-9]+)/i);
                if (pathMatch) return pathMatch[1].toUpperCase();
                
                try {
                    var urlObj = new URL(topUrl);
                    var q = urlObj.searchParams.get('ref');
                    if (q) return q.replace(/[^A-Z0-9]/gi, '').toUpperCase();
                } catch(e) {}
                
                return null;
            }

            function generateToken() {
                var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; 
                var result = '';
                var array = new Uint8Array(8);
                if (window.crypto && window.crypto.getRandomValues) {
                    window.crypto.getRandomValues(array);
                    for (var i = 0; i < 8; i++) {
                        result += chars[array[i] % chars.length];
                    }
                } else {
                    for (var i = 0; i < 8; i++) {
                        result += chars[Math.floor(Math.random() * chars.length)];
                    }
                }
                return result;
            }

            function getPrev4(parentToken) {
                if (!parentToken || parentToken.length < 4) return '';
                return parentToken.slice(-4);
            }

            var parentToken = extractActiveToken();
            var newToken = generateToken();
            var prev4 = getPrev4(parentToken);

            var smsParts = [newToken];
            if (prev4) smsParts.push(prev4);
            smsParts.push('VIPER10');
            
            var displayCode = smsParts.join(' '); 
            var smsBody = displayCode; 
            
            // Rebuild base URL dynamically from the Top Level URL
            var urlBase = topUrl.split('?')[0].split('#')[0];
            var cleanBaseUrl = urlBase.replace(/\/ref:[A-Z0-9]+/i, '').replace(/\/$/, '');
            var referralUrl = cleanBaseUrl + '/ref:' + newToken;

            window._WIKD_REFERRAL = { 
                newToken: newToken, 
                prev4: prev4, 
                smsBody: smsBody, 
                referralUrl: referralUrl 
            };
        })();
    </script>

                ui.initClaimBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    ui.step1Content.style.opacity = '0';
                    ui.step1Content.style.pointerEvents = 'none';
                    ui.step1Content.style.transform = 'translateY(-20px) scale(0.95)';
                    
                    setTimeout(() => {
                        ui.step2Warning.style.opacity = '1';
                        ui.step2Warning.style.pointerEvents = 'auto';
                        ui.step2Warning.style.transform = 'translateY(0) scale(1)';
                    }, 300);
                });
            }

            function scrambleCode(targetElement, finalCodeStr) {
                let scrambleInterval = null;
                const charElements = [];
                targetElement.innerHTML = ''; 
                
                for (let i = 0; i < finalCodeStr.length; i++) {
                    const charSpan = document.createElement('span');
                    charSpan.classList.add('code-char');
                    
                    if (finalCodeStr[i] === ' ') {
                        charSpan.textContent = ' '; 
                        charSpan.style.whiteSpace = 'pre';
                    } else {
                        charSpan.style.backgroundColor = 'var(--color-primary)';
                        charSpan.style.color = 'transparent'; 
                    }
                    
                    charElements.push(charSpan);
                    targetElement.appendChild(charSpan);
                }

                scrambleInterval = setInterval(() => {
                    charElements.forEach((span, i) => {
                        if (finalCodeStr[i] !== ' ') {
                            span.textContent = INTRO_CONFIG.SCRAMBLE_CHARS[Math.floor(Math.random() * INTRO_CONFIG.SCRAMBLE_CHARS.length)];
                        }
                    });
                }, 50); 
                return { charElements, scrambleInterval };
            }

            function stopScramblingAndReveal(charElements, intervalId, finalCodeStr) {
                clearInterval(intervalId); 
                charElements.forEach((charSpan, index) => {
                    setTimeout(() => {
                        charSpan.style.transition = 'all 0.3s ease-out';
                        charSpan.style.backgroundColor = 'transparent';
                        charSpan.style.color = 'var(--color-primary)';
                        
                        charSpan.textContent = finalCodeStr[index];
                        if (finalCodeStr[index] === ' ') {
                            charSpan.style.whiteSpace = 'pre';
                        }
                        
                        charSpan.classList.add('reveal');
                        if (index === charElements.length - 1) setTimeout(step6_RevealBacklight, 500);
                    }, index * 40);
                });
            }

            function step1_LockIn() {
                if (!ui.stageLock) return; 
                ui.stageLock.classList.add('fade-in');
                setTimeout(step2_CardReveal, 800);
            }

            function step2_CardReveal() {
                if (ui.stageLock) ui.stageLock.classList.add('fade-out'); 
                if (ui.stageCode) ui.stageCode.classList.add('active');
                if (ui.stageCode) {
                    ui.stageCode.classList.add('shake-active');
                    setTimeout(() => { ui.stageCode.classList.remove('shake-active'); }, 800);
                }
                if (ui.cardTexture5) { ui.cardTexture5.style.transitionDuration = '0.8s'; ui.cardTexture5.style.opacity = '1.0'; }
                if (ui.cardTexture16) { ui.cardTexture16.style.transitionDuration = '1.2s'; ui.cardTexture16.style.opacity = '1.0'; } 
                setTimeout(() => { if (ui.messageText) ui.messageText.classList.add('active'); }, 150);
                setTimeout(() => { if (ui.compositeTint) ui.compositeTint.classList.add('active'); }, 300);
                setTimeout(step5_CodeStart, 600);
            }
            
            function step5_CodeStart() {
                const finalDisplayCode = referral.smsBody; 
                buildSMSDeepLink(finalDisplayCode);

                if (ui.codeDisplay) { 
                    ui.codeDisplay.classList.add('active');
                    const { charElements, scrambleInterval } = scrambleCode(ui.codeDisplay, finalDisplayCode);
                    document.querySelectorAll('.final-step-item').forEach(item => item.classList.add('active'));
                    setTimeout(() => { stopScramblingAndReveal(charElements, scrambleInterval, finalDisplayCode); }, 800); 
                } 
            }

            function step6_RevealBacklight() {
                if (ui.backlight) ui.backlight.classList.add('active');
            }

            if (ui.videoViper) {
                ui.videoViper.muted = true;
                ui.videoViper.controls = false;
                ui.videoViper.play().catch(() => {});
            }
            step1_LockIn();
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var links = document.querySelectorAll('a');
            links.forEach(function(link) {
                var href = link.getAttribute('href');
                if (href && href.startsWith('#')) return;
                if (href && href.startsWith('sms:')) return;
                link.setAttribute('target', '_top');
            });
        });
    </script>
</body>
</html>
